name: Weekly Attorney Joke

on:
  schedule:
    - cron: '0 14 * * 1'  # Every Monday at 9am ET (2pm UTC)
  workflow_dispatch:       # Allows you to trigger it manually from GitHub for testing

permissions:
  contents: write

jobs:
  post-joke:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Check out repo
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          token: ${{ secrets.GH_PAT }}

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Post attorney joke to LinkedIn
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          LINKEDIN_ACCESS_TOKEN: ${{ secrets.LINKEDIN_ACCESS_TOKEN }}
        run: python post_joke.py

      - name: Commit updated jokes.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add jokes.json posts.json state.json
          git diff --cached --quiet || git commit -m "Mark joke as posted [skip ci]"
          git push
