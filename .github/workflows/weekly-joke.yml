name: Weekly Attorney Joke

on:
  schedule:
    - cron: '0 14 * * 1'  # Every Monday at 9am ET (2pm UTC)
  workflow_dispatch:       # Allows you to trigger it manually from GitHub for testing

jobs:
  post-joke:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Post attorney joke to LinkedIn
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          LINKEDIN_ACCESS_TOKEN: ${{ secrets.LINKEDIN_ACCESS_TOKEN }}
        run: python post_joke.py
